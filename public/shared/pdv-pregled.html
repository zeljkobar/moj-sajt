<!DOCTYPE html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mjesečne PDV tabele - Summa Summarum" />
    <title>Mjesečne PDV Tabele - Summa Summarum</title>

    <link rel="apple-touch-icon" sizes="180x180" href="/shared/images/favicon/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/shared/images/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/shared/images/favicon/favicon-16x16.png" />
    <link rel="manifest" href="/shared/site.webmanifest" />

    <script src="/shared/components/dynamic-favicon.js"></script>
    <script src="/shared/components/theme-preloader.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/shared/style.css" />
    <link rel="stylesheet" href="/shared/global-components.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

    <style>
      body {
        background: #f5f7fb;
      }

      .pdv-shell {
        max-width: 1320px;
        margin: 0 auto;
        padding: 34px 24px 56px;
      }

      .pdv-topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 28px;
      }

      .pdv-title h1 {
        color: #172033;
        font-size: 28px;
        font-weight: 760;
        letter-spacing: 0;
        margin: 0 0 8px;
      }

      .pdv-title p {
        color: #667085;
        font-size: 16px;
        margin: 0;
      }

      .pdv-create-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        font-weight: 700;
        padding: 12px 18px;
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.2);
        white-space: nowrap;
      }

      .pdv-create-btn:hover {
        background: #1d4ed8;
      }

      .pdv-layout {
        display: grid;
        grid-template-columns: minmax(320px, 440px) minmax(0, 1fr);
        gap: 24px;
        align-items: start;
      }

      .month-grid {
        display: grid;
        gap: 16px;
      }

      .month-card {
        background: #fff;
        border: 1px solid #dde3ee;
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        padding: 18px;
      }

      .month-card.is-selected {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12), 0 8px 24px rgba(15, 23, 42, 0.08);
      }

      .month-card-header {
        display: grid;
        grid-template-columns: 44px 1fr auto;
        gap: 12px;
        align-items: start;
        margin-bottom: 16px;
      }

      .month-icon {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: #eef5ff;
        color: #2563eb;
        font-size: 20px;
      }

      .month-name {
        color: #182235;
        font-size: 20px;
        font-weight: 760;
        line-height: 1.2;
        margin: 0 0 3px;
      }

      .month-date {
        color: #667085;
        font-size: 14px;
      }

      .month-actions {
        display: flex;
        gap: 12px;
        color: #98a2b3;
      }

      .month-actions i.done {
        color: #16a34a;
      }

      .month-actions i.note {
        color: #7c3aed;
      }

      .month-actions i.delete {
        color: #ef4444;
      }

      .month-total {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid #eef2f7;
        padding-bottom: 12px;
        margin-bottom: 12px;
        color: #667085;
        font-size: 15px;
      }

      .month-total strong {
        color: #172033;
        font-size: 18px;
      }

      .month-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 24px;
        color: #667085;
        font-size: 14px;
        margin-bottom: 18px;
      }

      .month-stat {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .month-stat strong.red {
        color: #ef4444;
      }

      .month-stat strong.blue {
        color: #2563eb;
      }

      .month-stat strong.green {
        color: #16a34a;
      }

      .month-stat strong.orange {
        color: #f97316;
      }

      .month-detail-btn {
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border: 1px solid #dde3ee;
        border-radius: 8px;
        background: #fff;
        color: #172033;
        font-weight: 700;
        padding: 10px 12px;
      }

      .month-detail-btn:hover {
        background: #f8fafc;
      }

      .details-panel {
        background: #fff;
        border: 1px solid #dde3ee;
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        overflow: hidden;
      }

      .details-header {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        padding: 20px;
        border-bottom: 1px solid #eef2f7;
      }

      .details-header h2 {
        color: #172033;
        font-size: 22px;
        font-weight: 760;
        margin: 0 0 4px;
      }

      .details-header p {
        color: #667085;
        margin: 0;
      }

      .details-tools {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 16px 20px;
        border-bottom: 1px solid #eef2f7;
        background: #fbfcfe;
      }

      .details-tools input,
      .details-tools select {
        border: 1px solid #d7deea;
        border-radius: 8px;
        padding: 10px 12px;
        color: #172033;
        background: #fff;
      }

      .details-tools input {
        flex: 1;
        min-width: 180px;
      }

      .client-table-wrap {
        overflow-x: auto;
      }

      .client-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 760px;
      }

      .client-table th {
        color: #667085;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        padding: 13px 16px;
        border-bottom: 1px solid #eef2f7;
        background: #fff;
      }

      .client-table td {
        color: #172033;
        padding: 14px 16px;
        border-bottom: 1px solid #eef2f7;
        vertical-align: middle;
      }

      .muted {
        display: block;
        color: #667085;
        font-size: 13px;
        margin-top: 2px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 13px;
        font-weight: 700;
      }

      .status-pill.predano {
        background: #dcfce7;
        color: #15803d;
      }

      .status-pill.kasni {
        background: #fee2e2;
        color: #b91c1c;
      }

      .status-pill.uskoro {
        background: #ffedd5;
        color: #c2410c;
      }

      .status-pill.nepredano {
        background: #dbeafe;
        color: #1d4ed8;
      }

      .row-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .row-action {
        border: 1px solid #d7deea;
        border-radius: 8px;
        background: #fff;
        color: #344054;
        width: 36px;
        height: 36px;
      }

      .row-action.submit {
        color: #15803d;
      }

      .row-action.undo {
        color: #475467;
      }

      .empty-state {
        padding: 34px 20px;
        text-align: center;
        color: #667085;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1050;
        inset: 0;
        background: rgba(15, 23, 42, 0.42);
        padding: 24px;
      }

      .modal-content {
        background: #fff;
        border: 0;
        border-radius: 8px;
        max-width: 460px;
        margin: 12vh auto 0;
        box-shadow: 0 22px 70px rgba(15, 23, 42, 0.24);
      }

      .modal-header,
      .modal-body {
        padding: 20px;
      }

      .modal-header {
        border-bottom: 1px solid #eef2f7;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-header h3 {
        font-size: 20px;
        margin: 0;
      }

      .close {
        cursor: pointer;
        font-size: 24px;
        color: #667085;
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 18px;
      }

      @media (max-width: 980px) {
        .pdv-layout {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 680px) {
        .pdv-shell {
          padding: 22px 14px 42px;
        }

        .pdv-topbar,
        .details-header,
        .details-tools {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div class="pdv-shell">
      <div class="pdv-topbar">
        <div class="pdv-title">
          <h1>Mjesečne PDV Tabele</h1>
          <p>Automatski generisane tabele PDV obveznika</p>
        </div>
        <button class="pdv-create-btn" type="button" onclick="openNewMonthModal()">
          <i class="fas fa-plus"></i>
          Kreiraj tabelu
        </button>
      </div>

      <div class="pdv-layout">
        <section>
          <div id="monthCards" class="month-grid">
            <div class="empty-state">Učitavam mjesečne tabele...</div>
          </div>
        </section>

        <section class="details-panel" id="detailsPanel">
          <div class="empty-state">Izaberite mjesečnu tabelu za prikaz detalja.</div>
        </section>
      </div>
    </div>

    <div id="newMonthModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3><i class="fas fa-plus me-2"></i>Kreiraj PDV tabelu</h3>
          <span class="close" onclick="closeNewMonthModal()">&times;</span>
        </div>
        <div class="modal-body">
          <form id="newMonthForm" onsubmit="submitNewMonth(event)">
            <label for="newMjesec" class="form-label">Mjesec</label>
            <input class="form-control" type="month" id="newMjesec" name="mjesec" required />
            <div class="form-actions">
              <button type="button" class="btn btn-outline-secondary" onclick="closeNewMonthModal()">Odustani</button>
              <button type="submit" class="btn btn-primary">Kreiraj</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="/shared/notifications.js"></script>
    <script src="/shared/script.js"></script>
    <script src="/shared/components/navigation.js"></script>
    <script>
      let monthCards = [];
      let currentMonth = "";
      let currentOverview = null;
      let searchTerm = "";
      let statusFilter = "all";

      document.addEventListener("DOMContentLoaded", function () {
        loadPDVPage();
      });

      async function loadPDVPage(preferredMonth = "") {
        const [overviewData, historyData] = await Promise.all([
          fetchJson("/api/pdv"),
          fetchJson("/api/pdv/istorija"),
        ]);

        if (!overviewData?.success) {
          renderFatalState("Greška pri učitavanju PDV podataka");
          return;
        }

        currentOverview = overviewData;
        currentMonth = preferredMonth || overviewData.rok_info.trenutni_mjesec;
        monthCards = buildMonthCards(overviewData, historyData?.istorija || []);
        renderMonthCards();
        await selectMonth(currentMonth);
      }

      async function fetchJson(url, options = {}) {
        const response = await fetch(url, {
          credentials: "include",
          ...options,
          headers: {
            "Content-Type": "application/json",
            ...(options.headers || {}),
          },
        });
        return response.json();
      }

      function buildMonthCards(overviewData, history) {
        const cardsByMonth = new Map();

        history.forEach((item) => {
          const month = normalizeMonth(item.mjesec);
          cardsByMonth.set(month, {
            month,
            total: Number(item.ukupno_firmi || 0),
            done: Number(item.predano_firmi || 0),
            unfinished: Number(item.nepredano_firmi || 0),
            pending: 0,
            received: 0,
            entered: 0,
          });
        });

        const overviewMonth = overviewData.rok_info.trenutni_mjesec;
        const total = overviewData.firme.length;
        const done = overviewData.firme.filter((firma) => firma.predano).length;
        cardsByMonth.set(overviewMonth, {
          month: overviewMonth,
          total,
          done,
          unfinished: Math.max(total - done, 0),
          pending: overviewData.firme.filter((firma) => firma.status === "uskoro").length,
          received: 0,
          entered: 0,
        });

        return Array.from(cardsByMonth.values()).sort((a, b) => b.month.localeCompare(a.month));
      }

      function renderMonthCards() {
        const container = document.getElementById("monthCards");

        if (monthCards.length === 0) {
          container.innerHTML = '<div class="empty-state">Još nema kreiranih PDV tabela.</div>';
          return;
        }

        container.innerHTML = monthCards
          .map((card) => {
            const isSelected = card.month === currentMonth ? "is-selected" : "";
            return `
              <article class="month-card ${isSelected}">
                <div class="month-card-header">
                  <div class="month-icon"><i class="far fa-calendar"></i></div>
                  <div>
                    <h2 class="month-name">PDV ${formatMonthShort(card.month)}</h2>
                    <div class="month-date">${formatCreatedDate(card.month)}</div>
                  </div>
                  <div class="month-actions" aria-hidden="true">
                    <i class="far fa-envelope done"></i>
                    <i class="far fa-comment-dots note"></i>
                    <i class="far fa-trash-alt delete"></i>
                  </div>
                </div>
                <div class="month-total">
                  <span>Ukupno klijenata:</span>
                  <strong>${card.total}</strong>
                </div>
                <div class="month-stats">
                  <div class="month-stat"><span>Nezavršeno:</span><strong class="red">${card.unfinished}</strong></div>
                  <div class="month-stat"><span>Primljeno:</span><strong class="orange">${card.received}</strong></div>
                  <div class="month-stat"><span>Bez statusa:</span><strong>${card.pending}</strong></div>
                  <div class="month-stat"><span>Unijeto:</span><strong>${card.entered}</strong></div>
                  <div class="month-stat"><span>Završeno:</span><strong class="green">${card.done}</strong></div>
                </div>
                <button class="month-detail-btn" type="button" onclick="selectMonth('${card.month}')">
                  <i class="far fa-eye"></i>
                  Prikaži detalje
                </button>
              </article>
            `;
          })
          .join("");
      }

      async function selectMonth(month) {
        currentMonth = month;
        searchTerm = "";
        statusFilter = "all";
        renderMonthCards();
        renderDetailsLoading();

        const data = await fetchJson(`/api/pdv?mjesec=${encodeURIComponent(month)}`);
        if (!data?.success) {
          document.getElementById("detailsPanel").innerHTML =
            '<div class="empty-state">Greška pri učitavanju tabele.</div>';
          return;
        }

        currentOverview = data;
        updateSelectedCardFromOverview(data);
        renderMonthCards();
        renderDetails();
      }

      function updateSelectedCardFromOverview(data) {
        const total = data.firme.length;
        const done = data.firme.filter((firma) => firma.predano).length;
        const index = monthCards.findIndex((card) => card.month === currentMonth);

        const nextCard = {
          month: currentMonth,
          total,
          done,
          unfinished: Math.max(total - done, 0),
          pending: data.firme.filter((firma) => firma.status === "uskoro").length,
          received: 0,
          entered: 0,
        };

        if (index >= 0) {
          monthCards[index] = nextCard;
        } else {
          monthCards.unshift(nextCard);
        }
      }

      function renderDetailsLoading() {
        document.getElementById("detailsPanel").innerHTML =
          '<div class="empty-state"><i class="fas fa-spinner fa-spin me-2"></i>Učitavam detalje...</div>';
      }

      function renderDetails() {
        const firms = getFilteredFirms();
        const selected = monthCards.find((card) => card.month === currentMonth);

        document.getElementById("detailsPanel").innerHTML = `
          <div class="details-header">
            <div>
              <h2>PDV ${formatMonthShort(currentMonth)}</h2>
              <p>${selected?.done || 0}/${selected?.total || 0} završenih prijava</p>
            </div>
            <button class="btn btn-outline-primary" type="button" onclick="openNewMonthModal()">
              <i class="fas fa-plus me-2"></i>Kreiraj tabelu
            </button>
          </div>
          <div class="details-tools">
            <input
              id="pdvSearch"
              type="search"
              placeholder="Pretraži firmu, PIB ili PDV broj..."
              value="${escapeAttribute(searchTerm)}"
              oninput="searchTerm = this.value; renderDetails();"
            />
            <select id="pdvStatusFilter" onchange="statusFilter = this.value; renderDetails();">
              <option value="all" ${statusFilter === "all" ? "selected" : ""}>Svi statusi</option>
              <option value="nepredano" ${statusFilter === "nepredano" ? "selected" : ""}>Nezavršeno</option>
              <option value="predano" ${statusFilter === "predano" ? "selected" : ""}>Završeno</option>
              <option value="kasni" ${statusFilter === "kasni" ? "selected" : ""}>Kasni</option>
              <option value="uskoro" ${statusFilter === "uskoro" ? "selected" : ""}>Uskoro</option>
            </select>
          </div>
          <div class="client-table-wrap">
            ${
              firms.length
                ? renderFirmTable(firms)
                : '<div class="empty-state">Nema firmi za izabrani filter.</div>'
            }
          </div>
        `;
      }

      function getFilteredFirms() {
        const query = searchTerm.trim().toLowerCase();
        return (currentOverview?.firme || []).filter((firma) => {
          const normalizedStatus = firma.predano ? "predano" : firma.status || "nepredano";
          const matchesStatus = statusFilter === "all" || normalizedStatus === statusFilter;
          const matchesSearch =
            !query ||
            String(firma.naziv || "").toLowerCase().includes(query) ||
            String(firma.pib || "").includes(query) ||
            String(firma.pdvBroj || "").toLowerCase().includes(query);
          return matchesStatus && matchesSearch;
        });
      }

      function renderFirmTable(firms) {
        return `
          <table class="client-table">
            <thead>
              <tr>
                <th>Firma</th>
                <th>PIB / PDV</th>
                <th>Status</th>
                <th>Datum predaje</th>
                <th class="text-end">Akcije</th>
              </tr>
            </thead>
            <tbody>
              ${firms.map(renderFirmRow).join("")}
            </tbody>
          </table>
        `;
      }

      function renderFirmRow(firma) {
        const status = firma.predano ? "predano" : firma.status || "nepredano";
        return `
          <tr>
            <td>
              <strong>${escapeHtml(firma.naziv || "-")}</strong>
              <span class="muted">${escapeHtml(firma.adresa || "")}</span>
            </td>
            <td>
              <strong>${escapeHtml(firma.pib || "-")}</strong>
              <span class="muted">PDV: ${escapeHtml(firma.pdvBroj || "-")}</span>
            </td>
            <td>${renderStatus(status)}</td>
            <td>${firma.datum_predanja ? formatDate(firma.datum_predanja) : '<span class="muted">Nije predato</span>'}</td>
            <td>
              <div class="row-actions">
                ${
                  firma.predano
                    ? `<button class="row-action undo" title="Ukloni predaju" onclick="unmarkSubmitted(${firma.id})"><i class="fas fa-undo"></i></button>`
                    : `<button class="row-action submit" title="Označi kao završeno" onclick="markAsSubmitted(${firma.id})"><i class="fas fa-check"></i></button>`
                }
              </div>
            </td>
          </tr>
        `;
      }

      function renderStatus(status) {
        const labels = {
          predano: "Završeno",
          kasni: "Kasni",
          uskoro: "Uskoro",
          nepredano: "Nezavršeno",
        };
        const icons = {
          predano: "fa-check",
          kasni: "fa-triangle-exclamation",
          uskoro: "fa-clock",
          nepredano: "fa-circle",
        };
        const cssClass = status === "na_vremenu" ? "nepredano" : status;
        return `<span class="status-pill ${cssClass}"><i class="fas ${icons[cssClass] || "fa-circle"}"></i>${labels[cssClass] || "Nezavršeno"}</span>`;
      }

      async function markAsSubmitted(firmaId) {
        const napomena = prompt("Napomena (opcionalno):");
        const data = await fetchJson(`/api/pdv/${firmaId}/submit`, {
          method: "POST",
          body: JSON.stringify({ napomena, mjesec: `${currentMonth}-01` }),
        });

        if (data.success) {
          showNotification("PDV prijava je označena kao završena", "success");
          await selectMonth(currentMonth);
        } else {
          showNotification(data.message || "Greška pri označavanju", "error");
        }
      }

      async function unmarkSubmitted(firmaId) {
        if (!confirm("Da li želite da uklonite oznaku završeno?")) return;

        const data = await fetchJson(`/api/pdv/${firmaId}/unsubmit`, {
          method: "POST",
          body: JSON.stringify({ mjesec: `${currentMonth}-01` }),
        });

        if (data.success) {
          showNotification("Oznaka završeno je uklonjena", "success");
          await selectMonth(currentMonth);
        } else {
          showNotification(data.message || "Greška pri uklanjanju oznake", "error");
        }
      }

      function openNewMonthModal() {
        document.getElementById("newMjesec").value = currentMonth || getDefaultMonth();
        document.getElementById("newMonthModal").style.display = "block";
      }

      function closeNewMonthModal() {
        document.getElementById("newMonthModal").style.display = "none";
      }

      async function submitNewMonth(event) {
        event.preventDefault();
        const month = new FormData(event.target).get("mjesec");
        const data = await fetchJson("/api/pdv/novi-mjesec", {
          method: "POST",
          body: JSON.stringify({ mjesec: `${month}-01` }),
        });

        if (data.success) {
          showNotification(`Kreirana PDV tabela za ${data.firme_count} firmi`, "success");
          closeNewMonthModal();
          await loadPDVPage(month);
        } else {
          showNotification(data.message || "Greška pri kreiranju tabele", "error");
        }
      }

      function getDefaultMonth() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
      }

      function normalizeMonth(value) {
        return String(value || "").slice(0, 7);
      }

      function formatMonthShort(month) {
        const [year, monthNum] = month.split("-");
        return `${monthNum}/${year}`;
      }

      function formatCreatedDate(month) {
        const date = new Date(`${month}-25T12:00:00`);
        return date.toLocaleDateString("sr-Latn-ME", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
        });
      }

      function formatDate(value) {
        return new Date(value).toLocaleDateString("sr-Latn-ME", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
        });
      }

      function renderFatalState(message) {
        document.getElementById("monthCards").innerHTML = `<div class="empty-state">${message}</div>`;
        document.getElementById("detailsPanel").innerHTML = "";
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttribute(value) {
        return escapeHtml(value).replaceAll("`", "&#096;");
      }

      window.onclick = function (event) {
        const modal = document.getElementById("newMonthModal");
        if (event.target === modal) closeNewMonthModal();
      };
    </script>
  </body>
</html>
