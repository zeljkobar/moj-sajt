<!DOCTYPE html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle">Profil firme | MojRadnik.me</title>
    <meta id="metaDesc" name="description" content="Poslovni profil firme na MojRadnik.me" />

    <!-- Open Graph za dijeljenje na društvenim mrežama -->
    <meta id="ogTitle"  property="og:title"       content="Poslovni profil | MojRadnik.me" />
    <meta id="ogDesc"   property="og:description" content="" />
    <meta              property="og:type"         content="website" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

    <style>
      * { box-sizing: border-box; }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        min-height: 100vh;
        margin: 0;
        background: #eef1f8;
      }

      /* ── HERO POZADINA (puna širina) ── */
      .hero-bg {
        background: linear-gradient(160deg, #0f2548 0%, #1a3a6b 40%, #2c5aa0 75%, #3a6fd8 100%);
        width: 100%;
        padding: 3.5rem 1rem 6rem;
        text-align: center;
        color: white;
      }
      .hero-bg .firma-naziv {
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px;
      }
      .hero-bg .firma-grad {
        font-size: 0.95rem; opacity: 0.75;
        display: inline-flex; align-items: center; gap: 6px;
      }
      .hero-bg .firma-opis {
        max-width: 560px; margin: 12px auto 0;
        font-size: 1rem; opacity: 0.85; line-height: 1.6;
      }

      /* ── DESKTOP LAYOUT ── */
      .page-body {
        max-width: 1060px;
        margin: -3.5rem auto 3rem;
        padding: 0 1.5rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        align-items: start;
      }

      /* ── KARTICE ── */
      .panel {
        background: white;
        border-radius: 18px;
        box-shadow: 0 4px 28px rgba(0,0,0,0.09);
        overflow: hidden;
      }
      .panel-header {
        padding: 1.1rem 1.4rem;
        border-bottom: 1px solid #f0f0f0;
        font-weight: 700; font-size: 0.85rem;
        text-transform: uppercase; letter-spacing: 0.06em;
        color: #6c757d;
        display: flex; align-items: center; gap: 8px;
      }
      .panel-body { padding: 1.25rem 1.4rem; }

      /* Info kartica - lijevo */
      .info-row {
        display: flex; align-items: flex-start; gap: 12px;
        padding: 10px 0; border-bottom: 1px solid #f5f5f5;
      }
      .info-row:last-child { border-bottom: none; padding-bottom: 0; }
      .info-icon {
        width: 36px; height: 36px; border-radius: 9px;
        background: #eef2fb; color: #2c5aa0;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; font-size: 0.95rem;
      }
      .info-label { font-size: 0.75rem; color: #9ca3af; margin-bottom: 2px; }
      .info-value { font-size: 0.95rem; color: #1f2937; font-weight: 500; word-break: break-word; }

      /* Chip-ovi */
      .chip {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 5px 13px; border-radius: 20px;
        font-size: 0.8rem; font-weight: 500; margin: 3px;
      }
      .chip-blue  { background: #eef2fb; color: #2c5aa0; }
      .chip-green { background: #e8f5e9; color: #1a7a3c; }

      /* ── DUGMAD (desno) ── */
      .link-btn {
        display: flex; align-items: center;
        width: 100%; padding: 13px 16px;
        border-radius: 12px; margin-bottom: 9px;
        font-size: 0.97rem; font-weight: 600;
        text-decoration: none; border: none; cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      }
      .link-btn:last-child { margin-bottom: 0; }
      .link-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.13); filter: brightness(1.04); }
      .link-btn:active { transform: scale(0.99); }
      .link-btn .btn-icon {
        width: 34px; height: 34px; border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        margin-right: 13px; flex-shrink: 0; font-size: 1.05rem;
        background: rgba(255,255,255,0.22);
      }
      .link-btn .btn-text { flex: 1; text-align: left; }
      .link-btn .btn-arrow { opacity: 0.65; font-size: 0.85rem; }

      .btn-phone     { background: linear-gradient(135deg,#1db954,#17a844); color:white; }
      .btn-instagram { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color:white; }
      .btn-facebook  { background: #1877f2; color:white; }
      .btn-linkedin  { background: #0a66c2; color:white; }
      .btn-whatsapp  { background: linear-gradient(135deg,#25d366,#128c7e); color:white; }
      .btn-maps      { background: white; color:#3c4043; border:1.5px solid #e0e0e0; }
      .btn-maps  .btn-icon { background:#e8f0fe; color:#2c5aa0; }
      .btn-web       { background: white; color:#1a1a1a; border:1.5px solid #e0e0e0; }
      .btn-web   .btn-icon { background:#f0f0f0; color:#555; }
      .btn-email     { background: white; color:#1a1a1a; border:1.5px solid #e0e0e0; }
      .btn-email .btn-icon { background:#fce8e6; color:#ea4335; }
      .btn-meni      { background: white; color:#1a1a1a; border:1.5px solid #e0e0e0; }
      .btn-meni  .btn-icon { background:#fff3e0; color:#e65100; }

      /* Footer */
      .profil-footer {
        text-align: center; padding: 1.5rem 1rem 2rem;
        color: #b0b8c9; font-size: 0.75rem;
        max-width: 1060px; margin: 0 auto;
        padding-left: 1.5rem; padding-right: 1.5rem;
      }
      .profil-footer a { color: #9ca3af; text-decoration: none; }
      .profil-footer a:hover { color: #2c5aa0; }

      /* Loading/error */
      .state-screen {
        min-height: 60vh; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center; padding: 2rem; color: #6c757d;
      }

      /* ── MOBILNI (max 700px) → stacked ── */
      @media (max-width: 700px) {
        .hero-bg { padding: 2.5rem 1rem 5rem; }
        .page-body {
          grid-template-columns: 1fr;
          margin-top: -2.5rem;
          padding: 0 0.75rem;
        }
      }
    </style>
  </head>
  <body>

    <!-- Loading -->
    <div id="loadingState" class="state-screen">
      <div class="spinner-border text-primary mb-3" role="status"></div>
      <p>Učitavanje profila...</p>
    </div>

    <!-- Greška -->
    <div id="errorState" class="state-screen d-none">
      <i class="fas fa-search fa-3x mb-3" style="color:#dee2e6;"></i>
      <h5>Profil nije pronađen</h5>
      <p class="small">Provjerite link ili se vratite na imenik.</p>
      <a href="/imenik" class="btn btn-outline-primary btn-sm mt-2">
        <i class="fas fa-list me-1"></i>Poslovni imenik
      </a>
    </div>

    <!-- Profil sadržaj -->
    <div id="profilContent" class="d-none">

      <!-- Hero header (puna širina) -->
      <div class="hero-bg">
        <div class="firma-naziv" id="firmaNaziv"></div>
        <div class="firma-grad"><i class="fas fa-map-marker-alt"></i><span id="firmaGrad"></span></div>
        <div class="firma-opis" id="firmaOpisHeader"></div>
      </div>

      <!-- Dvostupačni layout -->
      <div class="page-body">

        <!-- LIJEVO: informacije o firmi -->
        <div class="panel" id="infoPanel">
          <div class="panel-header"><i class="fas fa-building"></i> O firmi</div>
          <div class="panel-body" id="infoBody"></div>
        </div>

        <!-- DESNO: dugmad za akcije -->
        <div class="panel">
          <div class="panel-header"><i class="fas fa-link"></i> Kontakti i linkovi</div>
          <div class="panel-body">
            <div id="buttonsContainer"></div>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="profil-footer">
        <p>
          Profil kreiran na <a href="/imenik">MojRadnik.me</a>
          &nbsp;·&nbsp;
          <a href="/mojradnik/poslovni-imenik.html">Upišite vašu firmu</a>
          &nbsp;·&nbsp;
          <a href="/imenik">Poslovni imenik</a>
        </p>
      </div>

    </div>

    <script>
      // Dohvati slug iz URL-a
      const slug = window.location.pathname.replace('/imenik/', '').replace(/\/$/, '');

      async function loadProfil() {
        try {
          const res  = await fetch(`/api/imenik/profil/${encodeURIComponent(slug)}`);

          if (res.status === 404) {
            showError(); return;
          }

          const f = await res.json();

          // SEO meta
          document.getElementById('pageTitle').textContent  = `${f.naziv} | Poslovni imenik`;
          document.getElementById('ogTitle').content        = f.naziv;
          document.getElementById('ogDesc').content         = f.opis || `${f.naziv} — ${f.grad || 'Crna Gora'}`;
          document.getElementById('metaDesc').content       = f.opis || `${f.naziv} — kontakti i linkovi`;

          // Header
          document.getElementById('firmaNaziv').textContent = f.naziv;
          document.getElementById('firmaGrad').textContent  = [f.grad, f.adresa].filter(Boolean).join(', ');
          if (f.opis) {
            document.getElementById('firmaOpisHeader').textContent = f.opis;
          }

          // Info panel (lijevo)
          const infoRows = [];

          if (f.adresa || f.grad) {
            infoRows.push({ icon: 'fas fa-map-marker-alt', label: 'Adresa', value: [f.adresa, f.grad].filter(Boolean).join(', ') });
          }
          if (f.telefon) {
            infoRows.push({ icon: 'fas fa-phone', label: 'Telefon', value: f.telefon });
          }
          if (f.email) {
            infoRows.push({ icon: 'fas fa-envelope', label: 'Email', value: f.email });
          }
          if (f.radno_vrijeme) {
            infoRows.push({ icon: 'fas fa-clock', label: 'Radno vrijeme', value: f.radno_vrijeme });
          }
          if (f.naziv_djelatnosti || f.sifra_djelatnosti) {
            infoRows.push({ icon: 'fas fa-briefcase', label: 'Djelatnost', value: f.naziv_djelatnosti || f.sifra_djelatnosti });
          }

          document.getElementById('infoBody').innerHTML = infoRows.length > 0
            ? infoRows.map(r => `
                <div class="info-row">
                  <div class="info-icon"><i class="${r.icon}"></i></div>
                  <div>
                    <div class="info-label">${r.label}</div>
                    <div class="info-value">${escHtml(r.value)}</div>
                  </div>
                </div>`).join('')
            : '<p class="text-muted small mb-0">Nema dodatnih informacija.</p>';

          // Dugmad
          const container = document.getElementById('buttonsContainer');
          const buttons   = [];

          if (f.telefon) {
            buttons.push({
              cls: 'btn-phone',
              icon: 'fas fa-phone',
              text: `Pozovi nas &nbsp;<strong>${escHtml(f.telefon)}</strong>`,
              href: `tel:${f.telefon.replace(/\s/g, '')}`
            });
          }

          if (f.instagram) {
            buttons.push({
              cls: 'btn-instagram',
              icon: 'fab fa-instagram',
              text: 'Prati nas na Instagramu',
              href: f.instagram
            });
          }

          if (f.facebook) {
            buttons.push({
              cls: 'btn-facebook',
              icon: 'fab fa-facebook',
              text: 'Pronađi nas na Facebooku',
              href: f.facebook
            });
          }

          if (f.linkedin) {
            buttons.push({
              cls: 'btn-linkedin',
              icon: 'fab fa-linkedin',
              text: 'LinkedIn profil',
              href: f.linkedin
            });
          }

          if (f.google_maps) {
            buttons.push({
              cls: 'btn-maps',
              icon: 'fas fa-map-marker-alt',
              iconColor: '#ea4335',
              text: 'Kako do nas? (Google mapa)',
              href: f.google_maps
            });
          }

          if (f.digitalni_meni) {
            buttons.push({
              cls: 'btn-meni',
              icon: 'fas fa-utensils',
              text: 'Pogledaj naš meni',
              href: f.digitalni_meni
            });
          }

          if (f.web_sajt) {
            buttons.push({
              cls: 'btn-web',
              icon: 'fas fa-globe',
              iconColor: '#5f6368',
              text: 'Posjetite naš web sajt',
              href: f.web_sajt
            });
          }

          if (f.whatsapp) {
            const wpNum = f.whatsapp.replace(/\D/g, '');
            buttons.push({
              cls: 'btn-whatsapp',
              icon: 'fab fa-whatsapp',
              text: 'Pošalji poruku (WhatsApp)',
              href: `https://wa.me/${wpNum}`
            });
          }

          if (f.email) {
            buttons.push({
              cls: 'btn-email',
              icon: 'fas fa-envelope',
              iconColor: '#ea4335',
              text: 'Pošalji nam email',
              href: `mailto:${f.email}`
            });
          }

          container.innerHTML = buttons.map(b => `
            <a href="${escHtml(b.href)}" target="_blank" rel="noopener noreferrer" class="link-btn ${b.cls}">
              <div class="btn-icon" ${b.iconColor ? `style="color:${b.iconColor}"` : ''}>
                <i class="${b.icon}"></i>
              </div>
              <span class="btn-text">${b.text}</span>
              <i class="fas fa-chevron-right btn-arrow"></i>
            </a>
          `).join('');

          // Prikaži profil
          document.getElementById('loadingState').classList.add('d-none');
          document.getElementById('profilContent').classList.remove('d-none');

        } catch (err) {
          showError();
        }
      }

      function showError() {
        document.getElementById('loadingState').classList.add('d-none');
        document.getElementById('errorState').classList.remove('d-none');
      }

      function escHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      loadProfil();
    </script>
  </body>
</html>
