<!DOCTYPE html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poslovni imenik | MojRadnik.me</title>
    <meta name="description" content="Poslovni imenik crnogorskih firmi. Pronađite kontakte, lokaciju i linkove." />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

    <style>
      :root { --primary: #2c5aa0; --primary-dark: #1a3a6b; }
      body { background: #f4f6fb; font-family: 'Segoe UI', sans-serif; }

      .imenik-hero {
        background: linear-gradient(135deg, #1a3a6b 0%, #2c5aa0 100%);
        color: white; padding: 3rem 0 2.5rem;
      }
      .imenik-hero h1 { font-size: 2.2rem; font-weight: 800; }

      .search-box { position: relative; max-width: 540px; }
      .search-box input { border-radius: 50px; padding: 0.75rem 1.25rem 0.75rem 3rem; font-size: 1rem; border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
      .search-box .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #6c757d; }

      .firma-card {
        background: white; border-radius: 14px; padding: 1.25rem 1.5rem;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07); transition: transform 0.18s, box-shadow 0.18s;
        border: 1px solid #e8ecf3; text-decoration: none; color: inherit; display: block;
      }
      .firma-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(44,90,160,0.13); color: inherit; }
      .firma-card .naziv { font-size: 1.05rem; font-weight: 700; color: var(--primary-dark); }
      .firma-card .grad { font-size: 0.82rem; color: #6c757d; }
      .firma-card .djelatnost { font-size: 0.82rem; background: #eef2fb; color: var(--primary); padding: 2px 10px; border-radius: 20px; display: inline-block; margin-top: 6px; }
      .firma-card .opis { font-size: 0.88rem; color: #495057; margin-top: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .firma-card .contact-icons { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
      .firma-card .contact-icons span { font-size: 0.78rem; color: #6c757d; display: flex; align-items: center; gap: 4px; }

      .pagination .page-link { border-radius: 8px; color: var(--primary); }
      .pagination .page-item.active .page-link { background: var(--primary); border-color: var(--primary); }

      .no-results { text-align: center; padding: 4rem 2rem; color: #6c757d; }
      .loading-spinner { text-align: center; padding: 4rem; }
    </style>
  </head>
  <body>

    <div class="imenik-hero">
      <div class="container">
        <div class="row align-items-center mb-3">
          <div class="col">
            <h1 class="mb-1"><i class="fas fa-address-book me-2"></i>Poslovni imenik</h1>
            <p class="mb-0 opacity-75">Crnogorske firme na jednom mjestu</p>
          </div>
          <div class="col-auto">
            <a href="/mojradnik/dashboard.html" class="btn btn-outline-light btn-sm">
              <i class="fas fa-home me-1"></i>Dashboard
            </a>
          </div>
        </div>
        <!-- Pretraga -->
        <div class="search-box mx-auto" style="max-width:540px;">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="searchInput" class="form-control" placeholder="Pretraži firmu, djelatnost..." />
        </div>
      </div>
    </div>

    <div class="container py-4">
      <!-- Filteri -->
      <div class="d-flex flex-wrap gap-2 mb-4 align-items-center">
        <select id="filterGrad" class="form-select form-select-sm" style="max-width:160px;">
          <option value="">Svi gradovi</option>
          <option>Podgorica</option>
          <option>Bar</option>
          <option>Budva</option>
          <option>Nikšić</option>
          <option>Bijelo Polje</option>
          <option>Herceg Novi</option>
          <option>Berane</option>
          <option>Cetinje</option>
          <option>Kotor</option>
          <option>Tivat</option>
          <option>Pljevlja</option>
          <option>Ulcinj</option>
        </select>
        <span id="resultCount" class="text-muted small ms-auto"></span>
      </div>

      <!-- Lista firmi -->
      <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner-border text-primary" role="status"></div>
      </div>

      <div id="firmeList" class="row g-3 d-none"></div>

      <div id="noResults" class="no-results d-none">
        <i class="fas fa-search fa-3x mb-3 d-block"></i>
        <h5>Nema rezultata</h5>
        <p>Pokušajte drugačiju pretragu ili uklonite filter.</p>
      </div>

      <!-- Paginacija -->
      <nav id="paginacija" class="d-none mt-4">
        <ul class="pagination justify-content-center" id="paginacijaList"></ul>
      </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      let currentPage = 1;
      let searchTimeout;

      async function loadFirme(page = 1) {
        const search = document.getElementById('searchInput').value.trim();
        const grad   = document.getElementById('filterGrad').value;

        document.getElementById('loadingSpinner').classList.remove('d-none');
        document.getElementById('firmeList').classList.add('d-none');
        document.getElementById('noResults').classList.add('d-none');
        document.getElementById('paginacija').classList.add('d-none');

        const params = new URLSearchParams({ page, limit: 18 });
        if (search) params.append('search', search);
        if (grad)   params.append('grad', grad);

        try {
          const res  = await fetch(`/api/imenik?${params}`);
          const data = await res.json();

          document.getElementById('loadingSpinner').classList.add('d-none');
          document.getElementById('resultCount').textContent =
            data.ukupno > 0 ? `${data.ukupno} firma pronađeno` : '';

          if (!data.rezultati || data.rezultati.length === 0) {
            document.getElementById('noResults').classList.remove('d-none');
            return;
          }

          renderFirme(data.rezultati);
          renderPaginacija(data.stranica, data.ukupnoStranica);
          currentPage = page;
        } catch (err) {
          document.getElementById('loadingSpinner').classList.add('d-none');
          document.getElementById('noResults').classList.remove('d-none');
        }
      }

      function renderFirme(firme) {
        const list = document.getElementById('firmeList');
        list.innerHTML = firme.map(f => `
          <div class="col-md-6 col-lg-4">
            <a href="/imenik/${f.slug}" class="firma-card">
              <div class="d-flex justify-content-between align-items-start">
                <div class="naziv">${escHtml(f.naziv)}</div>
                ${f.grad ? `<span class="grad"><i class="fas fa-map-marker-alt me-1"></i>${escHtml(f.grad)}</span>` : ''}
              </div>
              ${f.naziv_djelatnosti ? `<div class="djelatnost">${escHtml(f.naziv_djelatnosti)}</div>` : ''}
              ${f.opis ? `<div class="opis">${escHtml(f.opis)}</div>` : ''}
              <div class="contact-icons">
                ${f.telefon ? `<span><i class="fas fa-phone"></i>${escHtml(f.telefon)}</span>` : ''}
                ${f.instagram ? `<span><i class="fab fa-instagram"></i>Instagram</span>` : ''}
                ${f.facebook  ? `<span><i class="fab fa-facebook"></i>Facebook</span>` : ''}
                ${f.whatsapp  ? `<span><i class="fab fa-whatsapp"></i>WhatsApp</span>` : ''}
                ${f.web_sajt  ? `<span><i class="fas fa-globe"></i>Web</span>` : ''}
              </div>
            </a>
          </div>
        `).join('');
        list.classList.remove('d-none');
      }

      function renderPaginacija(trenutna, ukupno) {
        if (ukupno <= 1) return;
        const nav  = document.getElementById('paginacija');
        const list = document.getElementById('paginacijaList');
        list.innerHTML = '';

        for (let i = 1; i <= ukupno; i++) {
          list.innerHTML += `
            <li class="page-item ${i === trenutna ? 'active' : ''}">
              <button class="page-link" onclick="loadFirme(${i})">${i}</button>
            </li>`;
        }
        nav.classList.remove('d-none');
      }

      function escHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      // Event listeneri
      document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => loadFirme(1), 400);
      });
      document.getElementById('filterGrad').addEventListener('change', () => loadFirme(1));

      // Inicijalno učitavanje
      loadFirme(1);
    </script>
  </body>
</html>
